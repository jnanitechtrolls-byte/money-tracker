openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: Money Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: expenses
    description: Expense/Income operations
  - name: accounts
    description: Account operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List transactions for current user
      parameters:
        - in: query
          name: month
          schema:
            type: string
          description: "Filter by month (YYYY-MM)"
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
          description: "Filter by type: expense | income"
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
        "401":
          description: Unauthorized

    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /expenses/summary:
    get:
      operationId: getExpenseSummary
      tags: [expenses]
      summary: Get monthly statistics and category breakdown
      parameters:
        - in: query
          name: month
          schema:
            type: string
          description: "Month (YYYY-MM), defaults to current month"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseSummary"
        "401":
          description: Unauthorized

  /expenses/{id}:
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update a transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Not found

    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete a transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List accounts for current user
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized

    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /accounts/{id}:
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized
        "404":
          description: Not found

    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Expense:
      type: object
      required: [id, userId, type, amount, category, description, date, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        authorName:
          type: string
        date:
          type: string
        createdAt:
          type: string

    ExpenseInput:
      type: object
      required: [amount, category, date]
      properties:
        type:
          type: string
        amount:
          type: number
        category:
          type: string
          minLength: 1
        description:
          type: string
        authorName:
          type: string
        date:
          type: string

    ExpenseUpdate:
      type: object
      properties:
        type:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string

    CategoryTotal:
      type: object
      required: [category, total]
      properties:
        category:
          type: string
        total:
          type: number

    ExpenseSummary:
      type: object
      required: [totalExpenses, totalIncome, balance, byCategory, recentExpenses, monthlyStats]
      properties:
        totalExpenses:
          type: number
        totalIncome:
          type: number
        balance:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTotal"
        recentExpenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        monthlyStats:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyStat"

    MonthlyStat:
      type: object
      required: [month, expenses, income, balance]
      properties:
        month:
          type: string
        expenses:
          type: number
        income:
          type: number
        balance:
          type: number

    Account:
      type: object
      required: [id, userId, name, type, currency, amount, icon, includeInTotal, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        amount:
          type: number
        icon:
          type: string
        includeInTotal:
          type: boolean
        createdAt:
          type: string

    AccountInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
        currency:
          type: string
        amount:
          type: number
        icon:
          type: string
        includeInTotal:
          type: boolean
