openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Money Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: expenses
    description: Expense operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses for current user
      parameters:
        - in: query
          name: month
          schema:
            type: string
          description: "Filter by month (YYYY-MM)"
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
        "401":
          description: Unauthorized

    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /expenses/summary:
    get:
      operationId: getExpenseSummary
      tags: [expenses]
      summary: Get expense summary and analytics for current user
      parameters:
        - in: query
          name: month
          schema:
            type: string
          description: "Month to summarize (YYYY-MM), defaults to current month"
      responses:
        "200":
          description: Expense summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseSummary"
        "401":
          description: Unauthorized

  /expenses/{id}:
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Not found

    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Expense:
      type: object
      required: [id, userId, amount, category, description, date, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        date:
          type: string
          description: "Calendar date (YYYY-MM-DD)"
        createdAt:
          type: string

    ExpenseInput:
      type: object
      required: [amount, category, description, date]
      properties:
        amount:
          type: number
        category:
          type: string
          minLength: 1
        description:
          type: string
        date:
          type: string
          description: "Calendar date (YYYY-MM-DD)"

    ExpenseUpdate:
      type: object
      properties:
        amount:
          type: number
        category:
          type: string
          minLength: 1
        description:
          type: string
        date:
          type: string

    CategoryTotal:
      type: object
      required: [category, total]
      properties:
        category:
          type: string
        total:
          type: number

    ExpenseSummary:
      type: object
      required: [totalThisMonth, totalAllTime, byCategory, recentExpenses]
      properties:
        totalThisMonth:
          type: number
        totalAllTime:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTotal"
        recentExpenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
