kind = "web"
previewPath = "/"
title = "Money Tracker"
version = "1.0.0"
id = "artifacts/money-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23703

[services.development]
run = "pnpm --filter @workspace/money-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/money-tracker", "run", "build" ]
publicDir = "artifacts/money-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23703"
BASE_PATH = "/"
